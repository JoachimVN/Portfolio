<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHORIDOR - Online Multiplayer</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js" integrity="sha256-eb9jjdSs3rm4DFpACaPhmGlo1hXpVX3PI9kbXorRWNg=" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Lobby -->
    <div id="lobby-overlay" class="lobby-overlay">
        <div class="lobby-card">
            <button class="lobby-card-close hidden" id="btn-lobby-back" aria-label="Back to game">✕</button>
            <img src="images/logos/logo.png" alt="CHORIDOR" class="lobby-logo">

            <div id="lview-mode" class="lobby-view">
                <div class="lobby-name-wrap">
                    <input type="text" id="player-name-input" class="lobby-name-input" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>

                <button class="lobby-mode-card" id="btn-local">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                        <circle cx="19" cy="7" r="2"/><path d="M23 21v-1a3 3 0 0 0-2-2.83"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">Local</span>
                        <span class="mode-sub">Same device</span>
                    </div>
                </button>

                <button class="lobby-mode-card" id="btn-online">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">Online</span>
                        <span class="mode-sub">Play with a friend</span>
                    </div>
                </button>

                <button class="lobby-mode-card lobby-mode-disabled" id="btn-ai" disabled>
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <rect x="9" y="9" width="6" height="6"/>
                        <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">vs AI</span>
                        <span class="mode-sub">Coming soon</span>
                    </div>
                </button>

                <div class="lobby-footer">
                    <a href="tos.html" id="btn-tos">Terms</a>
                    <span>·</span>
                    <a href="privacy.html" id="btn-privacy">Privacy</a>
                    <span class="lobby-version">v1.2.1</span>
                </div>
            </div>

            <div id="lview-online" class="lobby-view hidden">
                <p class="lobby-subtitle">Play with a friend online</p>
                <div class="lobby-buttons">
                    <button class="win-action-btn" id="btn-create">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
                        </svg>
                        <span>Create Room</span>
                    </button>
                    <button class="win-action-btn" id="btn-join">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        <span>Join Room</span>
                    </button>
                </div>
                <p class="lobby-error hidden" id="create-error"></p>
                <button class="lobby-back" id="btn-online-back">← Back</button>
            </div>

            <div id="lview-waiting" class="lobby-view hidden">
                <p class="lobby-subtitle">Waiting for opponent</p>
                <div class="lobby-code" id="room-code-display"></div>
                <button class="win-btn" id="btn-copy-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <span id="copy-btn-label">Copy Invite Link</span>
                </button>
                <button class="lobby-back" id="btn-waiting-back">← Cancel</button>
            </div>

            <div id="lview-join" class="lobby-view hidden">
                <div class="lobby-name-wrap">
                    <input type="text" id="join-player-name-input" class="lobby-name-input" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <p class="lobby-subtitle">Enter room code</p>
                <input class="lobby-input" id="room-code-input" placeholder="ABC" maxlength="3" autocomplete="off" spellcheck="false">
                <p class="lobby-error hidden" id="join-error"></p>
                <button class="win-btn" id="btn-join-confirm">Join Game</button>
                <button class="lobby-back" id="btn-join-back">← Back</button>
            </div>

            <div id="lview-discord" class="lobby-view hidden">
                <p class="lobby-subtitle">Play with a friend</p>
                <div class="lobby-name-wrap">
                    <input type="text" id="discord-name-input" class="lobby-name-input" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <button class="win-action-btn" id="btn-discord-play">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span>Play</span>
                </button>
                <p class="lobby-error hidden" id="discord-error"></p>
                <button class="lobby-back hidden" id="btn-discord-cancel">← Cancel</button>
            </div>
        </div>
    </div>

    <!-- Legal modal -->
    <div id="legal-modal" class="legal-modal hidden">
        <div class="legal-modal-backdrop" id="legal-modal-close"></div>
        <div class="legal-modal-card">
            <button class="legal-modal-x" id="legal-modal-x">✕</button>
            <div id="legal-modal-content"></div>
        </div>
    </div>

    <!-- Win screen -->
    <div id="win-overlay" class="win-overlay hidden">
        <div class="win-card" id="win-card">
            <button class="win-card-close" id="win-card-close" aria-label="Close">✕</button>
            <div class="win-pawn" id="win-pawn"></div>
            <div class="win-title" id="win-message"></div>
            <div class="win-divider"></div>

            <div class="win-stats" id="win-stats">
                <div class="win-stat-col">
                    <div class="win-stat-name" id="win-stat-p1-name">Player 1</div>
                    <div class="win-stat-walls" id="win-stat-p1-walls"></div>
                    <div class="win-stat-moves" id="win-stat-p1-moves">0</div>
                </div>
                <div class="win-stat-sep"></div>
                <div class="win-stat-col">
                    <div class="win-stat-name" id="win-stat-p2-name">Player 2</div>
                    <div class="win-stat-walls" id="win-stat-p2-walls"></div>
                    <div class="win-stat-moves" id="win-stat-p2-moves">0</div>
                </div>
            </div>

            <button id="play-again-btn" class="win-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                Play Again
            </button>
            <button id="btn-rematch"     class="win-btn hidden">Rematch</button>
            <button id="btn-change-mode" class="win-btn hidden">Change Mode</button>
        </div>
    </div>

    <!-- Shown when win overlay is dismissed in online mode -->
    <div id="win-footer" class="win-footer hidden">
        <span class="win-footer-label">Game over</span>
        <button id="win-footer-rematch"     class="win-footer-btn">Rematch</button>
        <button id="win-footer-change-mode" class="win-footer-btn win-footer-muted">Change Mode</button>
    </div>

    <div class="app">
        <div class="top-bar">
            <div class="player-section p1-section">
                <div class="player-avatar p1-avatar" id="p1-avatar"><img id="p1-avatar-img" src="" alt="" class="hidden"></div>
                <div class="player-name" id="p1-name">Player 1</div>
                <div class="wall-boxes" id="p1-walls"></div>
            </div>

            <img src="images/logos/logo.png" alt="CHORIDOR" class="logo">

            <div class="player-section p2-section">
                <div class="wall-boxes" id="p2-walls"></div>
                <div class="player-name" id="p2-name">Player 2</div>
                <div class="player-avatar p2-avatar" id="p2-avatar"><img id="p2-avatar-img" src="" alt="" class="hidden"></div>
            </div>
        </div>

        <div class="board-wrapper">
            <canvas id="gameBoard"></canvas>
            <output id="tap-toast" class="tap-toast" aria-live="polite" aria-hidden="true"></output>
        </div>

        <div class="bottom-bar">
            <div id="tap-confirm-hint" class="tap-confirm-hint" aria-hidden="true">
                <div class="tap-confirm-row">
                    <button type="button" class="tap-confirm-btn tap-confirm-cancel" id="tap-confirm-no" aria-label="Cancel wall preview" title="Cancel">
                        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="6" y1="6" x2="18" y2="18"/>
                            <line x1="18" y1="6" x2="6" y2="18"/>
                        </svg>
                    </button>
                    <button type="button" class="tap-confirm-btn tap-confirm-place" id="tap-confirm-yes" aria-label="Place wall here">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4,12.5 9.5,18 20,6"/>
                        </svg>
                        <span class="tap-confirm-label">Place wall</span>
                    </button>
                </div>
            </div>
            <div class="status-label" id="status">Player 1's Turn</div>
            <div class="controls">
                <button id="anim-btn" class="icon-btn anim-off" type="button" aria-pressed="false" aria-label="Turn animations on">
                    <svg id="anim-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3.2l1.7 4.9 4.9 1.7-4.9 1.7L12 16.4l-1.7-4.9L5.4 9.8l4.9-1.7L12 3.2z"/>
                        <path d="M18.5 14.5l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8.8-2z"/>
                        <line x1="3" y1="3" x2="21" y2="21"/>
                    </svg>
                </button>
                <button id="mute-btn" class="icon-btn" type="button" aria-label="Toggle sound effects">
                    <svg id="mute-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                </button>
                <button id="flip-btn" class="icon-btn" type="button" aria-label="Flip board">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 4v6h6M23 20v-6h-6"></path>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"></path>
                    </svg>
                </button>
                <button id="tap-mode-btn" class="icon-btn" type="button" aria-pressed="false" aria-label="Toggle confirm walls">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 9.5V4a2 2 0 0 1 4 0v8"/>
                        <path d="M14 8.5a2 2 0 0 1 4 0V12"/>
                        <path d="M18 10.5a2 2 0 0 1 4 0V15a7 7 0 0 1-7 7h-1.5a6 6 0 0 1-4.24-1.76l-4.6-4.6a2 2 0 0 1 2.83-2.83L10 14.5"/>
                    </svg>
                </button>
                <button id="change-mode-btn" type="button" aria-label="Change mode">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Change Mode</span>
                </button>
                <button id="new-game-btn" type="button" aria-label="New game">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    <span>New Game</span>
                </button>
            </div>
        </div>
    </div>

    <script src="js/socket.io.min.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
