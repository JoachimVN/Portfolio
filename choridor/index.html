<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHORIDOR - Online Multiplayer</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js" integrity="sha256-eb9jjdSs3rm4DFpACaPhmGlo1hXpVX3PI9kbXorRWNg=" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Lobby -->
    <div id="lobby-overlay" class="lobby-overlay">
        <div class="lobby-card">
            <img src="images/logos/logo.png" alt="CHORIDOR" class="lobby-logo">

            <div id="lview-mode" class="lobby-view">
                <div class="lobby-name-wrap">
                    <input type="text" id="player-name-input" class="lobby-name-input" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>

                <button class="lobby-mode-card" id="btn-local">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                        <circle cx="19" cy="7" r="2"/><path d="M23 21v-1a3 3 0 0 0-2-2.83"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">Local</span>
                        <span class="mode-sub">Same device</span>
                    </div>
                </button>

                <button class="lobby-mode-card" id="btn-online">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">Online</span>
                        <span class="mode-sub">Play with a friend</span>
                    </div>
                </button>

                <button class="lobby-mode-card lobby-mode-disabled" id="btn-ai" disabled>
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <rect x="9" y="9" width="6" height="6"/>
                        <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>
                    </svg>
                    <div class="mode-text">
                        <span class="mode-title">vs AI</span>
                        <span class="mode-sub">Coming soon</span>
                    </div>
                </button>

                <div class="lobby-footer">
                    <a href="tos.html">Terms</a>
                    <span>·</span>
                    <a href="privacy.html">Privacy</a>
                    <span class="lobby-version">v1.0.0</span>
                </div>
            </div>

            <div id="lview-online" class="lobby-view hidden">
                <p class="lobby-subtitle">Play with a friend online</p>
                <div class="lobby-buttons">
                    <button class="win-action-btn" id="btn-create">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
                        </svg>
                        <span>Create Room</span>
                    </button>
                    <button class="win-action-btn" id="btn-join">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        <span>Join Room</span>
                    </button>
                </div>
                <p class="lobby-error hidden" id="create-error"></p>
                <button class="lobby-back" id="btn-online-back">← Back</button>
            </div>

            <div id="lview-waiting" class="lobby-view hidden">
                <p class="lobby-subtitle">Waiting for opponent</p>
                <div class="lobby-code" id="room-code-display"></div>
                <button class="win-btn" id="btn-copy-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <span id="copy-btn-label">Copy Invite Link</span>
                </button>
                <button class="lobby-back" id="btn-waiting-back">← Cancel</button>
            </div>

            <div id="lview-join" class="lobby-view hidden">
                <div class="lobby-name-wrap">
                    <input type="text" id="join-player-name-input" class="lobby-name-input" placeholder="Your name" maxlength="20" autocomplete="off" spellcheck="false">
                </div>
                <p class="lobby-subtitle">Enter room code</p>
                <input class="lobby-input" id="room-code-input" placeholder="ABC" maxlength="3" autocomplete="off" spellcheck="false">
                <p class="lobby-error hidden" id="join-error"></p>
                <button class="win-btn" id="btn-join-confirm">Join Game</button>
                <button class="lobby-back" id="btn-join-back">← Back</button>
            </div>
        </div>
    </div>

    <!-- Win screen -->
    <div id="win-overlay" class="win-overlay hidden">
        <div class="win-card" id="win-card">
            <div class="win-pawn" id="win-pawn"></div>
            <div class="win-title" id="win-message"></div>
            <div class="win-divider"></div>
            <button id="play-again-btn" class="win-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                Play Again
            </button>
        </div>
    </div>

    <div class="app">
        <div class="top-bar">
            <div class="player-section p1-section">
                <div class="player-dot p1-dot"></div>
                <div class="player-name" id="p1-name">Player 1</div>
                <div class="wall-boxes" id="p1-walls"></div>
            </div>

            <img src="images/logos/logo.png" alt="CHORIDOR" class="logo">

            <div class="player-section p2-section">
                <div class="wall-boxes" id="p2-walls"></div>
                <div class="player-name" id="p2-name">Player 2</div>
                <div class="player-dot p2-dot"></div>
            </div>
        </div>

        <div class="board-wrapper">
            <canvas id="gameBoard"></canvas>
        </div>

        <div class="bottom-bar">
            <div class="status-label" id="status">Player 1's Turn</div>
            <div class="controls">
                <button id="flip-btn" class="icon-btn" title="Flip board">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 4v6h6M23 20v-6h-6"></path>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"></path>
                    </svg>
                </button>
                <button id="mute-btn" class="icon-btn" title="Mute">
                    <svg id="mute-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                </button>
                <button id="change-mode-btn">Change Mode</button>
                <button id="new-game-btn">New Game</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
